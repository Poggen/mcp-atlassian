name: "Publish Documentation"

on:
  push:
    branches:
      - main
    paths:
      - "mkdocs.yaml"
      - "docs/**"
      - ".github/workflows/publish-documentation.yaml"

permissions:
  id-token: write
  contents: read

jobs:
  publish-documentation:
    uses: WirelessCar-WDP/drive-actions/.github/workflows/publish-documentation.yaml@v2.12.0
    with:
      entity-kind: Component
