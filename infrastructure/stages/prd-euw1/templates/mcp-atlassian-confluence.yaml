# Least hacky way I could find for running second copy of apps/mcp-atlassian

{{- /* Custom Confluence pod copied from drive-service-infra templates, adjusted for name/path/env */ -}}
{{- $appName := "mcp-atlassian-confluence" -}}
{{- $appDetails := dict "tag" (index (index .Values.drive.apps "mcp-atlassian") "tag") -}}
{{- $app := .Values.drive.confluence -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $appName }}
  labels:
    {{- include "drive-service-infra.appLabels" (dict "appName" $appName "appDetails" $appDetails "context" .) | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: {{ $appName }}
  labels:
    {{- include "drive-service-infra.appLabels" (dict "appName" $appName "appDetails" $appDetails "context" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "drive-service-infra.appSelectorLabels" (dict "appName" $appName "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "drive-service-infra.appLabels" (dict "appName" $appName "appDetails" $appDetails "context" .) | nindent 8 }}
    spec:
      serviceAccountName: {{ $appName }}
      volumes:
        - name: nats-user-creds
          secret:
            secretName: mcp-atlassian-nats-user-creds
            optional: false
      containers:
        - name: main
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.drive.image.registry }}/{{ .Values.drive.verticalId }}/{{ .Values.drive.systemName }}/images/mcp-atlassian:{{ index (index .Values.drive.apps "mcp-atlassian") "tag" }}"
          env:
            - name: ENVIRONMENT
              value: {{ .Values.drive.stageName }}
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.drive.systemName }}.{{ $appName }}"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-in-cluster-collector.monitoring.svc.cluster.local:4318"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace={{ .Values.drive.systemName }}-{{ .Values.drive.stageName }},service.stage={{ .Values.drive.stageName }}"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_TRACES_EXPORTER
              value: "none"
            - name: NATS_URL
              value: "nats://nats.nats.svc.cluster.local:4222"
            {{- range $key, $value := $app.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := (default (dict) $app.secretEnv) }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $value.secretName }}
                  key: {{ $value.secretKey }}
            {{- end }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.drive.appDefaults.resources | nindent 12 }}
          volumeMounts:
            - mountPath: "/var/run/secrets/nats"
              name: nats-user-creds
      securityContext:
        runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $appName }}
  labels:
    {{- include "drive-service-infra.appLabels" (dict "appName" $appName "appDetails" $appDetails "context" .) | nindent 4 }}
spec:
  selector:
    {{- include "drive-service-infra.appSelectorLabels" (dict "appName" $appName "context" .) | nindent 4 }}
  ports:
    - port: 80
      targetPort: 3000
      name: http
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ $appName }}-public
  labels:
    {{- include "drive-service-infra.appLabels" (dict "appName" $appName "appDetails" $appDetails "context" .) | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.drive.systemName }}.public.{{ .Values.drive.stageName }}.{{ .Values.drive.verticalId }}.{{ .Values.drive.domain.default }}
  parentRefs:
    - name: public-gw
      namespace: gateway-system
      sectionName: {{ .Values.drive.stageName }}.{{ .Values.drive.verticalId }}.{{ .Values.drive.domain.default }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp-atlassian-confluence
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ $appName }}
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ $appName }}-gated
  labels:
    {{- include "drive-service-infra.appLabels" (dict "appName" $appName "appDetails" $appDetails "context" .) | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.drive.systemName }}.gated.{{ .Values.drive.stageName }}.{{ .Values.drive.verticalId }}.{{ .Values.drive.domain.default }}
  parentRefs:
    - name: gated-gw
      namespace: gateway-system
      sectionName: {{ .Values.drive.stageName }}.{{ .Values.drive.verticalId }}.{{ .Values.drive.domain.default }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp-atlassian-confluence
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ $appName }}
          port: 80
