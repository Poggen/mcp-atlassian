drive:
  stageName: dev-euw1
  systemName: mcp-atlassian
  verticalId: d1db59e

  db:
    enabled: false

  nats:
    enabled: true
    jetstream:
      enabled: true
      streams:
        mcp-client-store:
          size: S
          criticality: medium
          config:
            subjects:
              - "mcp.client.>"
    limits:
      jetStreamLimits:
        maxBytesRequired: false

  otel:
    enabled: true

  secrets:
    - mcp-atlassian-storage
    - mcp-atlassian-oauth

  apps:
    mcp-atlassian:
      tag: latest
      replicaCount: 1
      profile: generic

      httpGateway:
        gated: true
        public: true
        path: /mcp

      extraEgress:
        - toFQDNs:
            - matchName: "wcar-jira-test.riada.se"
          toPorts:
            - ports:
                - port: "443"
                  protocol: TCP

      nats:
        enabled: true
        permissions:
          pub:
            allow:
              - "$KV.>"
              - "$kv.>"
              - "$JS.API.>"
              - "_INBOX.>"
          sub:
            allow:
              - "$KV.>"
              - "$kv.>"
              - "$JS.API.>"
              - "_INBOX.>"

      env:
        TRANSPORT: streamable-http
        PORT: "3000"
        HOST: 0.0.0.0
        MCP_PATH: /mcp
        MCP_LOGGING_STDOUT: "true"
        READ_ONLY_MODE: "true"
        JIRA_URL: "https://wcar-jira-test.riada.se"
        JIRA_PROJECTS_EXCLUDE: "WCAR"
        STORAGE_BACKEND: jetstream
        STORAGE_BUCKET_PREFIX: mcp-client-
        STORAGE_DEFAULT_COLLECTION: registrations
        ATLASSIAN_OAUTH_SCOPE: "READ"
        ATLASSIAN_OAUTH_ALLOWED_CLIENT_REDIRECT_URIS: "https://chatgpt.com/connector_platform_oauth_redirect,https://chat.openai.com/connector_platform_oauth_redirect,http://localhost:*,http://127.0.0.1:*"
        ATLASSIAN_OAUTH_ALLOWED_GRANT_TYPES: "authorization_code,refresh_token"
        ATLASSIAN_OAUTH_REQUIRE_CONSENT: "false"
        ATLASSIAN_OAUTH_INSTANCE_TYPE: "datacenter"
        ATLASSIAN_OAUTH_REDIRECT_URI: "https://mcp-atlassian.public.dev-euw1.d1db59e.drive-platform.com/mcp-atlassian/callback"
        ATLASSIAN_OAUTH_ENABLE: "true"
      secretEnv:
        JWT_SIGNING_KEY:
          secretName: mcp-atlassian-storage
          secretKey: JWT_SIGNING_KEY
        STORAGE_ENCRYPTION_KEY:
          secretName: mcp-atlassian-storage
          secretKey: STORAGE_ENCRYPTION_KEY
        ATLASSIAN_OAUTH_CLIENT_ID:
          secretName: mcp-atlassian-oauth
          secretKey: JIRA_OAUTH_CLIENT_ID
        ATLASSIAN_OAUTH_CLIENT_SECRET:
          secretName: mcp-atlassian-oauth
          secretKey: JIRA_OAUTH_CLIENT_SECRET

      probes:
        liveness: /healthz
        readiness: /healthz

    mcp-atlassian-confluence:
      sourceImage: mcp-atlassian
      tag: latest
      replicaCount: 1
      profile: generic

      httpGateway:
        gated: true
        public: true

      extraEgress:
        - toFQDNs:
            - matchName: "wcar-confluence-test.riada.se"
          toPorts:
            - ports:
                - port: "443"
                  protocol: TCP

      nats:
        enabled: true
        permissions:
          pub:
            allow:
              - "$KV.>"
              - "$kv.>"
              - "$JS.API.>"
              - "_INBOX.>"
          sub:
            allow:
              - "$KV.>"
              - "$kv.>"
              - "$JS.API.>"
              - "_INBOX.>"

      env:
        TRANSPORT: streamable-http
        PORT: "3000"
        HOST: 0.0.0.0
        MCP_PATH: /mcp
        MCP_LOGGING_STDOUT: "true"
        READ_ONLY_MODE: "true"
        CONFLUENCE_URL: "https://wcar-confluence-test.riada.se"
        STORAGE_BACKEND: jetstream
        STORAGE_BUCKET_PREFIX: mcp-confluence-client-
        STORAGE_DEFAULT_COLLECTION: registrations
        ATLASSIAN_OAUTH_SCOPE: "READ"
        ATLASSIAN_OAUTH_ALLOWED_CLIENT_REDIRECT_URIS: "https://chatgpt.com/connector_platform_oauth_redirect,https://chat.openai.com/connector_platform_oauth_redirect,http://localhost:*,http://127.0.0.1:*"
        ATLASSIAN_OAUTH_ALLOWED_GRANT_TYPES: "authorization_code,refresh_token"
        ATLASSIAN_OAUTH_REQUIRE_CONSENT: "false"
        ATLASSIAN_OAUTH_INSTANCE_TYPE: "datacenter"
        ATLASSIAN_OAUTH_INSTANCE_URL: "https://wcar-confluence-test.riada.se"
        ATLASSIAN_OAUTH_REDIRECT_URI: "https://mcp-atlassian.public.dev-euw1.d1db59e.drive-platform.com/mcp-atlassian-confluence/callback"
      secretEnv:
        JWT_SIGNING_KEY:
          secretName: mcp-atlassian-storage
          secretKey: JWT_SIGNING_KEY
        STORAGE_ENCRYPTION_KEY:
          secretName: mcp-atlassian-storage
          secretKey: STORAGE_ENCRYPTION_KEY
        ATLASSIAN_OAUTH_CLIENT_ID:
          secretName: mcp-atlassian-oauth
          secretKey: CONFLUENCE_OAUTH_CLIENT_ID
        ATLASSIAN_OAUTH_CLIENT_SECRET:
          secretName: mcp-atlassian-oauth
          secretKey: CONFLUENCE_OAUTH_CLIENT_SECRET

      probes:
        liveness: /healthz
        readiness: /healthz

  appDefaults:
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
