# NATS users for local stage (helm drive-service-infra 1.10.x does not render per-app users in local)
{{- $apps := list "mcp-atlassian" "mcp-atlassian-confluence" -}}
{{- range $appName := $apps }}
---
apiVersion: nauth.io/v1alpha1
kind: User
metadata:
  name: {{ $appName }}
  labels:
    {{- include "drive-service-infra.appLabels" (dict "appName" $appName "appDetails" (index $.Values.drive.apps "mcp-atlassian") "context" $) | nindent 4 }}
spec:
  accountName: {{ $.Values.drive.systemName }}
  permissions:
    pub:
      allow:
        - "$KV.>"
        - "$kv.>"
        - "$JS.API.>"
        - "_INBOX.>"
        - "mcp.client.>"
    sub:
      allow:
        - "$KV.>"
        - "$kv.>"
        - "$JS.API.>"
        - "_INBOX.>"
        - "mcp.client.>"
{{- end }}
