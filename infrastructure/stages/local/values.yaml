systemName: mcp-atlassian

drive:
  stageName: local
  systemName: mcp-atlassian
  verticalId: d1db59e

  db:
    enabled: false

  nats:
    enabled: true
    jetstream:
      enabled: true
      streams:
        mcp-client-store:
          size: S
          criticality: medium
          config:
            subjects:
              - "mcp.client.>"
    limits:
      jetStreamLimits:
        maxBytesRequired: false

  otel:
    enabled: false

  secrets: []

  apps:
    mcp-atlassian:
      tag: latest
      replicaCount: 1
      profile: generic
      db: false
      nats:
        enabled: true
        permissions:
          pub:
            allow:
              - "$KV.>"
              - "$kv.>"
              - "$JS.API.>"
              - "_INBOX.>"
              - "mcp.client.>"
          sub:
            allow:
              - "$KV.>"
              - "$kv.>"
              - "$JS.API.>"
              - "_INBOX.>"
              - "mcp.client.>"
      env:
        TRANSPORT: streamable-http
        PORT: "3000"
        HOST: 0.0.0.0
        MCP_PATH: /mcp
        MCP_LOGGING_STDOUT: "true"
        READ_ONLY_MODE: "true"
        JIRA_URL: "https://wcar-jira-test.riada.se"
        JIRA_PROJECTS_EXCLUDE: "WCAR"
        STORAGE_BACKEND: jetstream
        STORAGE_BUCKET_PREFIX: mcp-client-
        STORAGE_DEFAULT_COLLECTION: registrations
        JWT_SIGNING_KEY: "dev-jwt-signing-key-change-me"
        STORAGE_ENCRYPTION_KEY: "f8XkS6zWIZ2shB_QhSiaY9hjiawR1C0tqJg8PJo3lqA="
        ATLASSIAN_OAUTH_SCOPE: "READ"
        ATLASSIAN_OAUTH_ALLOWED_CLIENT_REDIRECT_URIS: "http://localhost:*,http://127.0.0.1:*"
        ATLASSIAN_OAUTH_ALLOWED_GRANT_TYPES: "authorization_code,refresh_token"
        ATLASSIAN_OAUTH_REQUIRE_CONSENT: "false"
        ATLASSIAN_OAUTH_INSTANCE_TYPE: "datacenter"
        ATLASSIAN_OAUTH_INSTANCE_URL: "https://wcar-jira-test.riada.se"
        ATLASSIAN_OAUTH_REDIRECT_URI: "http://localhost:3000/callback"
        ATLASSIAN_OAUTH_ENABLE: "true"
      secretEnv:
        ATLASSIAN_OAUTH_CLIENT_ID:
          secretName: mcp-atlassian-oauth
          secretKey: JIRA_OAUTH_CLIENT_ID
        ATLASSIAN_OAUTH_CLIENT_SECRET:
          secretName: mcp-atlassian-oauth
          secretKey: JIRA_OAUTH_CLIENT_SECRET
      probes:
        liveness: /healthz
        readiness: /healthz

    mcp-atlassian-confluence:
      sourceImage: mcp-atlassian
      tag: latest
      replicaCount: 1
      profile: generic
      db: false
      nats:
        enabled: true
        permissions:
          pub:
            allow:
              - "$KV.>"
              - "$kv.>"
              - "$JS.API.>"
              - "_INBOX.>"
              - "mcp.client.>"
          sub:
            allow:
              - "$KV.>"
              - "$kv.>"
              - "$JS.API.>"
              - "_INBOX.>"
              - "mcp.client.>"
      env:
        TRANSPORT: streamable-http
        PORT: "3000"
        HOST: 0.0.0.0
        MCP_PATH: /mcp
        MCP_LOGGING_STDOUT: "true"
        READ_ONLY_MODE: "true"
        CONFLUENCE_URL: "https://wcar-confluence-test.riada.se"
        STORAGE_BACKEND: jetstream
        STORAGE_BUCKET_PREFIX: mcp-confluence-client-
        STORAGE_DEFAULT_COLLECTION: registrations
        JWT_SIGNING_KEY: "dev-jwt-signing-key-change-me"
        STORAGE_ENCRYPTION_KEY: "f8XkS6zWIZ2shB_QhSiaY9hjiawR1C0tqJg8PJo3lqA="
        ATLASSIAN_OAUTH_SCOPE: "READ"
        ATLASSIAN_OAUTH_ALLOWED_CLIENT_REDIRECT_URIS: "http://localhost:*,http://127.0.0.1:*"
        ATLASSIAN_OAUTH_ALLOWED_GRANT_TYPES: "authorization_code,refresh_token"
        ATLASSIAN_OAUTH_REQUIRE_CONSENT: "false"
        ATLASSIAN_OAUTH_INSTANCE_TYPE: "datacenter"
        ATLASSIAN_OAUTH_INSTANCE_URL: "https://wcar-confluence-test.riada.se"
        ATLASSIAN_OAUTH_REDIRECT_URI: "http://localhost:3000/callback"
        ATLASSIAN_OAUTH_ENABLE: "true"
      secretEnv:
        ATLASSIAN_OAUTH_CLIENT_ID:
          secretName: mcp-atlassian-oauth
          secretKey: CONFLUENCE_OAUTH_CLIENT_ID
        ATLASSIAN_OAUTH_CLIENT_SECRET:
          secretName: mcp-atlassian-oauth
          secretKey: CONFLUENCE_OAUTH_CLIENT_SECRET
      probes:
        liveness: /healthz
        readiness: /healthz

  appDefaults:
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
