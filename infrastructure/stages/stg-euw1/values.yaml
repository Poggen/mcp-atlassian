drive:
  stageName: stg-euw1
  systemName: mcp-atlassian
  verticalId: d1db59e

  db:
    enabled: false

  nats:
    enabled: true
    jetstream:
      enabled: true
      streams:
        mcp-client-store:
          size: S
          criticality: medium
          config:
            subjects:
              - "mcp.client.>"
    limits:
      jetStreamLimits:
        maxBytesRequired: false

  otel:
    enabled: false

  secrets:
    - mcp-atlassian-storage
    - mcp-atlassian-oauth

  apps:
    mcp-atlassian:
      tag: latest
      replicaCount: 1
      profile: generic

      httpGateway:
        gated: true
        public: true
        path: /mcp

      nats:
        enabled: true
        permissions:
          pub:
            allow:
              - "$KV.>"
              - "$kv.>"
              - "$JS.API.>"
              - "_INBOX.>"
          sub:
            allow:
              - "$KV.>"
              - "$kv.>"
              - "$JS.API.>"
              - "_INBOX.>"

      env:
        TRANSPORT: streamable-http
        PORT: "3000"
        HOST: 0.0.0.0
        MCP_PATH: /mcp
        MCP_LOGGING_STDOUT: "true"
        READ_ONLY_MODE: "true"
        JIRA_URL: "https://wcar-jira-test.riada.se"
        STORAGE_BACKEND: jetstream
        STORAGE_BUCKET_PREFIX: mcp-client-
        STORAGE_DEFAULT_COLLECTION: registrations
        ATLASSIAN_OAUTH_SCOPE: "READ"
        ATLASSIAN_OAUTH_INSTANCE_TYPE: "datacenter"
        ATLASSIAN_OAUTH_REDIRECT_URI: "https://mcp-atlassian.public.stg-euw1.d1db59e.drive-platform.com/mcp-atlassian/callback"
        ATLASSIAN_OAUTH_ENABLE: "true"
      secretEnv:
        JWT_SIGNING_KEY:
          secretName: mcp-atlassian-storage
          secretKey: JWT_SIGNING_KEY
        STORAGE_ENCRYPTION_KEY:
          secretName: mcp-atlassian-storage
          secretKey: STORAGE_ENCRYPTION_KEY
        ATLASSIAN_OAUTH_CLIENT_ID:
          secretName: mcp-atlassian-oauth
          secretKey: JIRA_OAUTH_CLIENT_ID
        ATLASSIAN_OAUTH_CLIENT_SECRET:
          secretName: mcp-atlassian-oauth
          secretKey: JIRA_OAUTH_CLIENT_SECRET

      probes:
        liveness: /healthz
        readiness: /healthz

  appDefaults:
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

  confluence:
    env:
      TRANSPORT: streamable-http
      PORT: "3000"
      HOST: 0.0.0.0
      MCP_PATH: /mcp
      MCP_LOGGING_STDOUT: "true"
      READ_ONLY_MODE: "true"
      CONFLUENCE_URL: "https://wcar-confluence-test.riada.se"
      STORAGE_BACKEND: jetstream
      STORAGE_BUCKET_PREFIX: mcp-confluence-client-
      STORAGE_DEFAULT_COLLECTION: registrations
      ATLASSIAN_OAUTH_SCOPE: "READ"
      ATLASSIAN_OAUTH_INSTANCE_TYPE: "datacenter"
      ATLASSIAN_OAUTH_INSTANCE_URL: "https://wcar-confluence-test.riada.se"
      ATLASSIAN_OAUTH_REDIRECT_URI: "https://mcp-atlassian.public.stg-euw1.d1db59e.drive-platform.com/mcp-atlassian-confluence/callback"
    secretEnv:
      JWT_SIGNING_KEY:
        secretName: mcp-atlassian-storage
        secretKey: JWT_SIGNING_KEY
      STORAGE_ENCRYPTION_KEY:
        secretName: mcp-atlassian-storage
        secretKey: STORAGE_ENCRYPTION_KEY
      ATLASSIAN_OAUTH_CLIENT_ID:
        secretName: mcp-atlassian-oauth
        secretKey: CONFLUENCE_OAUTH_CLIENT_ID
      ATLASSIAN_OAUTH_CLIENT_SECRET:
        secretName: mcp-atlassian-oauth
        secretKey: CONFLUENCE_OAUTH_CLIENT_SECRET
